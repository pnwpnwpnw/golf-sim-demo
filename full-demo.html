<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fairway Club · Full Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --green:        #1F5C3D;
    --green-deep:   #143C29;
    --green-mid:    #2E7D51;
    --green-soft:   #EAF1EC;
    --green-line:   #CFE0D5;
    --ink:          #16211C;
    --muted:        #66746B;
    --line:         #E7ECE8;
    --bg:           #E4E9E4;
    --card:         #FFFFFF;
    font-family: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--ink); display: flex; flex-direction: column; overflow: hidden; }

  /* ---- Demo top bar ---- */
  .demobar { background: var(--green-deep); color: #EAF1EC; height: 56px; flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 0 22px; z-index: 10; box-shadow: 0 2px 10px rgba(20,60,41,.18); }
  .demobar .logo { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--green-mid), var(--green)); display: grid; place-items: center; font-family: 'Inter'; font-weight: 700; font-size: 16px; color: #fff; }
  .demobar .brand { font-family: 'Inter'; font-weight: 600; font-size: 15px; line-height: 1.1; }
  .demobar .brand .s { font-size: 10.5px; opacity: .6; font-weight: 400; font-family: 'Inter'; }
  .demobar .flow { margin-left: 20px; display: flex; align-items: center; gap: 10px; font-family: 'Inter'; font-size: 11.5px; color: #AEC6B6; }
  .demobar .flow b { color: #EAF1EC; font-weight: 600; }
  .demobar .flow .arrow { opacity: .55; }
  .demobar .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .demobar button { font-family: 'Inter'; font-weight: 600; font-size: 12.5px; cursor: pointer; border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.08); color: #EAF1EC; padding: 8px 13px; border-radius: 9px; transition: .12s; }
  .demobar button:hover { background: rgba(255,255,255,.16); }

  /* ---- Stage ---- */
  .stage { flex: 1; display: flex; gap: 0; min-height: 0; }

  /* Customer (phone) side */
  .side-customer { width: 520px; flex-shrink: 0; background: radial-gradient(120% 100% at 50% 0%, #EEF3EE 0%, #DCE3DC 100%); border-right: 1px solid #CBD4CB; display: flex; flex-direction: column; min-height: 0; }
  .side-head { padding: 12px 18px 10px; flex-shrink: 0; }
  .side-head .t { font-family: 'Inter'; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .side-head .t .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-mid); }
  .side-head .d { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-family: 'Inter'; }
  .phone-wrap { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 6px 20px 22px; }

  /* device mockup */
  .phone { position: relative; height: 100%; max-height: 850px; aspect-ratio: 390 / 820;
    background: linear-gradient(158deg, #21382B 0%, #10231A 60%, #0B1912 100%);
    border-radius: 50px; padding: 13px;
    box-shadow: 0 26px 60px rgba(20,60,41,.34), 0 6px 16px rgba(0,0,0,.20), inset 0 0 0 2px rgba(255,255,255,.05), inset 0 0 0 6px rgba(0,0,0,.25); }
  .phone .screen { position: relative; height: 100%; border-radius: 38px; overflow: hidden; background: #143C29; display: flex; flex-direction: column; }
  .phone .statusbar { height: 30px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; font-family: 'Inter'; font-size: 12.5px; font-weight: 600; color: #EAF1EC; }
  .phone .statusbar .sig { display: flex; align-items: center; gap: 5px; font-size: 11px; letter-spacing: 1px; }
  .phone .island { position: absolute; top: 7px; left: 50%; transform: translateX(-50%); width: 92px; height: 19px;
    background: #05100A; border-radius: 12px; z-index: 3; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
  .phone .screen iframe { flex: 1; width: 100%; min-height: 0; border: none; display: block; background: #F4F6F4; }
  .phone .homebar { height: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #F4F6F4; }
  .phone .homebar i { width: 118px; height: 5px; border-radius: 3px; background: #16211C; opacity: .3; }

  /* Staff side */
  .side-staff { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; background: var(--card); }
  .side-staff iframe { width: 100%; height: 100%; border: none; }

  /* small-screen fallback — keep the phone on the LEFT, just make it narrower
     and let the whole stage scroll horizontally rather than stacking. */
  @media (max-width: 940px) {
    .side-customer { width: 400px; }
    .stage { min-width: 800px; }
    body { overflow-x: auto; }
  }
</style>
</head>
<body>
  <div class="demobar">
    <div class="logo">F</div>
    <div class="brand">Fairway Club<div class="s">Full Demo</div></div>
    <div class="flow">
      <b>Customer books</b><span class="arrow">→</span><b>Staff sees it live</b><span class="arrow">→</span><b>Approve &amp; track</b>
    </div>
    <div class="right">
      <button id="resetBtn" title="Clear all bookings and re-seed the demo">↻ Reset demo data</button>
    </div>
  </div>

  <div class="stage">
    <div class="side-customer">
      <div class="side-head">
        <div class="t"><span class="dot"></span> Customer app</div>
        <div class="d">what a golfer uses to book a bay (LINE-style)</div>
      </div>
      <div class="phone-wrap">
        <div class="phone">
          <div class="screen">
            <div class="island"></div>
            <div class="statusbar"><span>9:41</span><span class="sig">●●● &nbsp;⑤G&nbsp; 🔋</span></div>
            <iframe id="customerFrame" src="customer.html" title="Customer booking app"></iframe>
            <div class="homebar"><i></i></div>
          </div>
        </div>
      </div>
    </div>

    <div class="side-staff">
      <iframe id="staffFrame" src="dashboard.html" title="Staff console"></iframe>
    </div>
  </div>

<script>
(function () {
  'use strict';
  const customerFrame = document.getElementById('customerFrame');
  const staffFrame = document.getElementById('staffFrame');

  // Reset demo data. localStorage is shared across the same-origin iframes, so
  // resetting via either frame's DataLayer clears both; then reload both views.
  document.getElementById('resetBtn').onclick = function () {
    let done = false;
    [staffFrame, customerFrame].forEach(function (f) {
      try {
        const DL = f.contentWindow && f.contentWindow.DataLayer;
        if (DL && !done) { DL.resetAll(); DL.seedIfEmpty(); done = true; }
      } catch (e) { /* frame not ready / cross-origin (file://) */ }
    });
    // If we couldn't reach a DataLayer (e.g. opened via file://), fall back.
    if (!done) { try { localStorage.removeItem('setlytic_golfsim_demo_v1'); } catch (e) {} }
    customerFrame.contentWindow.location.reload();
    staffFrame.contentWindow.location.reload();
  };
})();
</script>
</body>
</html>
