<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fairway Club · Customers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --green:        #1F5C3D;
    --green-deep:   #143C29;
    --green-mid:    #2E7D51;
    --green-soft:   #EAF1EC;
    --green-line:   #CFE0D5;
    --ink:          #16211C;
    --muted:        #66746B;
    --faint:        #9AA6A0;
    --line:         #E7ECE8;
    --bg:           #F0F3F0;
    --card:         #FFFFFF;
    --danger:       #B4433A;
    --danger-soft:  #FBEDEB;
    --amber:        #B07A16;
    --amber-soft:   #FBF3E1;
    --amber-fill:   #C08A2E;
    --blue:         #35617F;
    --blue-soft:    #E9F0F4;
    --radius:       16px;
    --shadow:       0 1px 2px rgba(20,60,41,.04), 0 6px 20px rgba(20,60,41,.05);
    font-family: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--ink); min-height: 100vh; }

  /* ---- Top bar (shared with dashboard/reports) ---- */
  .topbar { background: var(--green-deep); color: #EAF1EC; padding: 0 26px; height: 62px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:40; }
  .topbar .logo { width:36px;height:36px;border-radius:10px; background: linear-gradient(135deg, var(--green-mid), var(--green)); display:grid;place-items:center; font-family:'Inter'; font-weight:700; font-size:18px; color:#fff; }
  .topbar .brand { font-family:'Inter'; font-weight:600; font-size:16px; line-height:1.1; }
  .topbar .brand .s { font-size:11px; opacity:.65; font-weight:400; font-family:'Inter'; }
  .topbar .nav { display:flex; gap:4px; margin-left:22px; }
  .topbar .nav a { color:#C7D6CC; font-size:13.5px; padding:7px 13px; border-radius:9px; text-decoration:none; font-weight:500; cursor:pointer; }
  .topbar .nav a.active { background: rgba(255,255,255,.12); color:#fff; }
  .topbar .nav a:not(.active):hover { background: rgba(255,255,255,.06); color:#fff; }
  .topbar .right { margin-left:auto; display:flex; align-items:center; gap:14px; }
  .live-dot { display:flex; align-items:center; gap:7px; font-family:'Inter'; font-size:11px; color:#AEC6B6; }
  .live-dot i { width:8px;height:8px;border-radius:50%; background:#5FD08A; animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(95,208,138,.5)} 70%{box-shadow:0 0 0 7px rgba(95,208,138,0)} 100%{box-shadow:0 0 0 0 rgba(95,208,138,0)} }
  .avatar { width:34px;height:34px;border-radius:50%; background:var(--green-mid); display:grid;place-items:center; font-family:'Inter'; font-weight:600; font-size:13px; color:#fff; }

  .demo-strip { background:#FFF7E6; color:#7A5B12; font-size:12px; font-family:'Inter'; padding:7px 26px; text-align:center; border-bottom:1px solid #F0E4C4; }
  .demo-strip b { font-weight:600; }

  .wrap { max-width: 1320px; margin: 0 auto; padding: 24px 26px 60px; }

  .page-head { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
  .page-head h1 { font-family:'Inter'; font-size:25px; font-weight:600; letter-spacing:-.015em; }
  .page-head .sub { color:var(--muted); font-size:13.5px; margin-top:3px; font-family:'Inter'; }

  .head-tools { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .btn-export { font-family:'Inter'; font-weight:600; font-size:13px; cursor:pointer; background:var(--green); color:#fff; border:none; padding:9px 15px; border-radius:11px; box-shadow:var(--shadow); transition:.12s; display:inline-flex; align-items:center; gap:7px; }
  .btn-export:hover { background:var(--green-deep); }
  .btn-export:active { transform:scale(.98); }

  /* search */
  .search { position:relative; }
  .search input { width:280px; max-width:60vw; padding:11px 14px 11px 36px; border:1px solid var(--line); border-radius:11px; font-family:'Inter'; font-size:14px; background:#fff; box-shadow:var(--shadow); }
  .search input:focus { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(31,92,61,.1); }
  .search .mag { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:14px; }

  /* ---- KPI hero row ---- */
  .kpi-row { display:grid; grid-template-columns: repeat(4, 1fr); gap:16px; margin-bottom:22px; }
  @media (max-width: 900px){ .kpi-row{ grid-template-columns: repeat(2,1fr);} }
  .kpi { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow); }
  .kpi .label { font-family:'Inter'; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; display:flex; align-items:center; gap:6px; }
  .kpi .ic { font-size:14px; }
  .kpi .val { font-family:'Inter'; font-weight:700; font-size:27px; letter-spacing:-.02em; margin-top:10px; line-height:1; }
  .kpi .delta { font-size:11.5px; color:var(--muted); margin-top:6px; }
  .kpi .delta b { font-weight:600; color:var(--green-mid); }

  /* ---- layout ---- */
  .grid { display:grid; grid-template-columns: 1fr 400px; gap:20px; align-items:start; }
  @media (max-width: 1080px){ .grid{ grid-template-columns:1fr; } }

  .panel { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
  .panel-head { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line); }
  .panel-head h2 { font-family:'Inter'; font-size:16px; font-weight:600; display:flex; align-items:center; gap:9px; }
  .panel-head .hint { font-size:12px; color:var(--muted); font-family:'Inter'; }

  /* sort tabs */
  .sortbar { display:flex; gap:4px; padding:10px 14px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .sortbar button { border:1px solid var(--line); background:#fff; font-family:'Inter'; font-size:11px; font-weight:600; color:var(--muted); padding:6px 11px; border-radius:8px; cursor:pointer; letter-spacing:.02em; }
  .sortbar button.on { background:var(--green-soft); border-color:var(--green-line); color:var(--green-deep); }

  /* customer rows */
  .clist { max-height:620px; overflow-y:auto; }
  .crow { display:grid; grid-template-columns: 42px 1fr auto; gap:12px; align-items:center; padding:13px 18px; border-top:1px solid var(--line); cursor:pointer; transition:.1s; }
  .crow:first-child { border-top:none; }
  .crow:hover { background:var(--green-soft); }
  .crow.sel { background:var(--green-soft); box-shadow: inset 3px 0 0 var(--green); }
  .cav { width:42px;height:42px;border-radius:50%; display:grid;place-items:center; font-family:'Inter'; font-weight:600; font-size:14px; color:#fff; }
  .cmain .nm { font-family:'Inter'; font-weight:600; font-size:14.5px; display:flex; align-items:center; gap:8px; }
  .cmain .meta { font-size:12px; color:var(--muted); margin-top:3px; font-family:'Inter'; }
  .cright { text-align:right; }
  .cright .spend { font-family:'Inter'; font-weight:700; font-size:14.5px; color:var(--green-deep); }
  .cright .vis { font-size:11px; color:var(--muted); margin-top:3px; font-family:'Inter'; }

  .tag { font-family:'Inter'; font-size:9.5px; font-weight:600; padding:2px 7px; border-radius:20px; letter-spacing:.03em; text-transform:uppercase; }
  .tag.Regular { background:var(--green-soft); color:var(--green-deep); }
  .tag.Returning { background:var(--blue-soft); color:var(--blue); }
  .tag.New { background:var(--amber-soft); color:var(--amber); }

  .list-empty { text-align:center; color:var(--muted); font-size:13px; padding:40px 10px; }
  .list-empty .ic { font-size:30px; opacity:.5; }

  /* ---- detail panel ---- */
  .detail { position:sticky; top:82px; }
  .detail .dhead { padding:20px 20px 16px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; }
  .detail .dav { width:54px;height:54px;border-radius:50%; display:grid;place-items:center; font-family:'Inter'; font-weight:700; font-size:19px; color:#fff; flex-shrink:0; }
  .detail .dname { font-family:'Inter'; font-weight:600; font-size:19px; letter-spacing:-.01em; }
  .detail .dphone { font-size:12.5px; color:var(--muted); margin-top:3px; font-family:'Inter'; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }

  .dstats { display:grid; grid-template-columns: repeat(3,1fr); gap:1px; background:var(--line); border-bottom:1px solid var(--line); }
  .dstat { background:#fff; padding:14px 12px; text-align:center; }
  .dstat .v { font-family:'Inter'; font-weight:700; font-size:19px; }
  .dstat .l { font-family:'Inter'; font-size:9.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-top:4px; }

  .dsection { padding:14px 18px 4px; font-family:'Inter'; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; }
  .hist { padding:2px 14px 16px; max-height:340px; overflow-y:auto; }
  .hrow2 { display:grid; grid-template-columns: 1fr auto; gap:8px; padding:11px 6px; border-top:1px solid var(--line); align-items:center; }
  .hrow2:first-child { border-top:none; }
  .hrow2 .when { font-family:'Inter'; font-weight:600; font-size:13px; }
  .hrow2 .det { font-size:11.5px; color:var(--muted); margin-top:2px; font-family:'Inter'; }
  .hrow2 .rt { text-align:right; }
  .hrow2 .amt { font-family:'Inter'; font-weight:600; font-size:13px; }
  .pill { font-family:'Inter'; font-size:9.5px; font-weight:600; padding:3px 8px; border-radius:20px; display:inline-block; margin-top:3px; }
  .pill.confirmed { background:var(--green-soft); color:var(--green-deep); }
  .pill.pending { background:var(--amber-soft); color:var(--amber); }
  .pill.cancelled { background:var(--danger-soft); color:var(--danger); }
  .src-tag { font-family:'Inter'; font-size:9.5px; color:var(--faint); }

  .detail-empty { text-align:center; color:var(--muted); font-size:13.5px; padding:70px 24px; }
  .detail-empty .ic { font-size:40px; opacity:.4; display:block; margin-bottom:12px; }
</style>
</head>
<body>
  <div class="topbar">
    <div class="logo">F</div>
    <div class="brand">Fairway Club<div class="s">Staff Console</div></div>
    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a class="active">Customers</a>
      <a href="reports.html">Reports</a>
    </div>
    <div class="right">
      <div class="live-dot"><i></i> LIVE · shared state</div>
      <div class="avatar">SN</div>
    </div>
  </div>
  <div class="demo-strip">◆ <b>DEMO</b> — customers are rolled up live from every booking · confirm a booking on the Dashboard and this directory updates</div>

  <div class="wrap">
    <div class="page-head">
      <div>
        <h1>Customers</h1>
        <div class="sub" id="subLabel"></div>
      </div>
      <div class="head-tools">
        <div class="search">
          <span class="mag">⌕</span>
          <input id="searchInput" type="text" placeholder="Search name or phone…" autocomplete="off" />
        </div>
        <button class="btn-export" id="exportBtn" title="Download the customer directory as a CSV file">⭳ Export CSV</button>
      </div>
    </div>

    <!-- Hero KPIs -->
    <div class="kpi-row" id="kpiRow"></div>

    <div class="grid">
      <!-- Directory -->
      <div class="panel">
        <div class="panel-head">
          <h2>▤ Directory</h2>
          <div class="hint" id="countHint"></div>
        </div>
        <div class="sortbar" id="sortBar">
          <button data-sort="spend" class="on">Top spend</button>
          <button data-sort="visits">Most visits</button>
          <button data-sort="recent">Recent</button>
          <button data-sort="name">Name A–Z</button>
        </div>
        <div class="clist" id="clist"></div>
      </div>

      <!-- Detail -->
      <div class="panel detail" id="detail"></div>
    </div>
  </div>

<script src="data-layer.js"></script>
<script>
(function () {
  'use strict';
  const DL = window.DataLayer;
  DL.seedIfEmpty();
  const $ = function (id) { return document.getElementById(id); };

  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  let sortMode = 'spend';
  let query = '';
  let selectedKey = null;

  function friendly(iso) { const d = new Date(iso + 'T00:00:00'); return DOW[d.getDay()] + ' ' + d.getDate() + ' ' + MON[d.getMonth()]; }
  function friendlyYear(iso) { const d = new Date(iso + 'T00:00:00'); return d.getDate() + ' ' + MON[d.getMonth()] + ' ' + d.getFullYear(); }

  // Deterministic avatar colour from the name so each person is recognisable.
  const AV_COLORS = ['#2E7D51','#35617F','#C08A2E','#7A5B9E','#B4433A','#1F8A70','#B07A16','#4A6FA5'];
  function avatarColor(name) {
    let h = 0; for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return AV_COLORS[h % AV_COLORS.length];
  }
  function initials(name) {
    const parts = name.replace(/[^A-Za-z ]/g, '').trim().split(/\s+/).filter(Boolean);
    if (!parts.length) return '?';
    return (parts[0][0] + (parts[1] ? parts[1][0] : '')).toUpperCase();
  }

  function sortList(list) {
    const l = list.slice();
    if (sortMode === 'spend')   l.sort(function (a, b) { return b.totalSpend - a.totalSpend; });
    if (sortMode === 'visits')  l.sort(function (a, b) { return b.visits - a.visits; });
    if (sortMode === 'recent')  l.sort(function (a, b) { return b.lastDate.localeCompare(a.lastDate); });
    if (sortMode === 'name')    l.sort(function (a, b) { return a.name.localeCompare(b.name); });
    return l;
  }

  function matches(c) {
    if (!query) return true;
    const q = query.toLowerCase();
    return c.name.toLowerCase().indexOf(q) !== -1 || (c.phone || '').toLowerCase().indexOf(q) !== -1;
  }

  // ---------- KPIs ----------
  function renderKPIs(all) {
    const totalCustomers = all.length;
    const repeat = all.filter(function (c) { return c.visits >= 2; }).length;
    const repeatPct = totalCustomers ? Math.round((repeat / totalCustomers) * 100) : 0;
    const revenue = all.reduce(function (a, c) { return a + c.totalSpend; }, 0);
    const avgPerCust = totalCustomers ? Math.round(revenue / totalCustomers) : 0;
    const withUpcoming = all.filter(function (c) { return c.upcoming > 0; }).length;

    $('kpiRow').innerHTML =
      kpi('👥','Total customers', totalCustomers, 'seen across all bookings') +
      kpi('🔁','Repeat customers', repeat, '<b>' + repeatPct + '%</b> booked more than once') +
      kpi('💷','Avg spend / customer', DL.money(avgPerCust), 'lifetime confirmed value') +
      kpi('📅','With upcoming', withUpcoming, 'have a future session booked');
  }
  function kpi(ic, label, val, delta) {
    return '<div class="kpi"><div class="label"><span class="ic">' + ic + '</span>' + label + '</div>' +
           '<div class="val">' + val + '</div><div class="delta">' + delta + '</div></div>';
  }

  // ---------- Directory list ----------
  function renderList(all) {
    const filtered = sortList(all.filter(matches));
    $('countHint').textContent = filtered.length + (filtered.length === 1 ? ' customer' : ' customers');
    const box = $('clist');
    if (!filtered.length) {
      box.innerHTML = '<div class="list-empty"><div class="ic">🔍</div><div style="margin-top:8px">No customers match “' + esc(query) + '”.</div></div>';
      return;
    }
    box.innerHTML = '';
    filtered.forEach(function (c) {
      const el = document.createElement('div');
      el.className = 'crow' + (c.key === selectedKey ? ' sel' : '');
      el.innerHTML =
        '<div class="cav" style="background:' + avatarColor(c.name) + '">' + initials(c.name) + '</div>' +
        '<div class="cmain"><div class="nm">' + esc(c.name) + ' <span class="tag ' + c.segment + '">' + c.segment + '</span></div>' +
        '<div class="meta">' + (c.phone ? esc(c.phone) + ' · ' : '') + c.channel + (c.upcoming ? ' · ' + c.upcoming + ' upcoming' : '') + '</div></div>' +
        '<div class="cright"><div class="spend">' + DL.money(c.totalSpend) + '</div>' +
        '<div class="vis">' + c.visits + (c.visits === 1 ? ' visit' : ' visits') + '</div></div>';
      el.onclick = function () { selectedKey = c.key; renderAll(); };
      box.appendChild(el);
    });
  }

  // ---------- Detail panel ----------
  function renderDetail(all) {
    const box = $('detail');
    const c = all.find(function (x) { return x.key === selectedKey; });
    if (!c) {
      box.innerHTML = '<div class="detail-empty"><span class="ic">👤</span>Select a customer to see their profile and full booking history.</div>';
      return;
    }
    let hist = '';
    c.bookings.forEach(function (b) {
      const pill = b.status === 'confirmed' ? 'confirmed' : (b.status === 'pending-payment' ? 'pending' : 'cancelled');
      const pillTxt = b.status === 'confirmed' ? 'CONFIRMED' : (b.status === 'pending-payment' ? 'PENDING' : 'CANCELLED');
      const src = b.source === 'customer' ? 'LINE' : (b.source === 'walk-in' ? 'walk-in' : 'staff');
      hist +=
        '<div class="hrow2"><div><div class="when">' + friendly(b.date) + '</div>' +
        '<div class="det">' + DL.CONFIG.ROOM_NAMES[b.room] + ' · ' + DL.rangeLabel(b.start, DL.durOf(b)) + ' · ' + src + '</div></div>' +
        '<div class="rt"><div class="amt">' + (b.price ? DL.money(b.price) : '—') + '</div>' +
        '<span class="pill ' + pill + '">' + pillTxt + '</span></div></div>';
    });

    box.innerHTML =
      '<div class="dhead"><div class="dav" style="background:' + avatarColor(c.name) + '">' + initials(c.name) + '</div>' +
      '<div><div class="dname">' + esc(c.name) + '</div>' +
      '<div class="dphone">' + (c.phone ? '📞 ' + esc(c.phone) : 'no phone on file') +
      ' <span class="tag ' + c.segment + '">' + c.segment + '</span></div></div></div>' +

      '<div class="dstats">' +
      dstat(c.visits, 'Visits') +
      dstat(DL.money(c.totalSpend), 'Lifetime') +
      dstat(DL.money(c.avgSpend), 'Avg / visit') +
      '</div>' +

      '<div class="dstats" style="grid-template-columns:repeat(3,1fr)">' +
      dstat(c.upcoming, 'Upcoming') +
      dstat(c.channel, 'Channel') +
      dstat(friendlyYear(c.firstDate).replace(/ \d{4}$/, ''), 'First seen') +
      '</div>' +

      '<div class="dsection">Booking history · ' + c.totalBookings + ' total</div>' +
      '<div class="hist">' + hist + '</div>';
  }
  function dstat(v, l) { return '<div class="dstat"><div class="v">' + v + '</div><div class="l">' + l + '</div></div>'; }

  function esc(s) { return String(s).replace(/[&<>"]/g, function (ch) { return ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' })[ch]; }); }

  // ---------- CSV export ----------
  // Quote a field per RFC 4180: wrap in quotes and double any inner quotes when
  // it contains a comma, quote, or newline.
  function csvCell(v) {
    const s = String(v == null ? '' : v);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }
  function csvRow(arr) { return arr.map(csvCell).join(','); }
  function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

  // Exports exactly what's on screen: the current search + sort applied.
  function buildCSV(list) {
    const lines = [];
    lines.push(csvRow(['Fairway Club — Customer directory']));
    lines.push(csvRow(['Generated', new Date().toLocaleString()]));
    if (query) lines.push(csvRow(['Filtered by', query]));
    lines.push('');
    lines.push(csvRow(['Name', 'Phone', 'Segment', 'Channel', 'Visits', 'Total spend', 'Avg spend / visit', 'Upcoming', 'First seen', 'Last seen']));
    list.forEach(function (c) {
      lines.push(csvRow([c.name, c.phone || '', c.segment, c.channel, c.visits, c.totalSpend, c.avgSpend, c.upcoming, c.firstDate, c.lastDate]));
    });
    return lines.join('\r\n');
  }

  // ---------- render all ----------
  function renderAll() {
    const all = DL.customers();
    // keep a valid selection when the underlying data changes
    if (selectedKey && !all.some(function (c) { return c.key === selectedKey; })) selectedKey = null;
    $('subLabel').textContent = 'Rolled up live from every booking · confirmed spend shown';
    renderKPIs(all);
    renderList(all);
    renderDetail(all);
  }

  // ---------- controls ----------
  Array.prototype.forEach.call($('sortBar').children, function (btn) {
    btn.onclick = function () {
      Array.prototype.forEach.call($('sortBar').children, function (b) { b.classList.remove('on'); });
      btn.classList.add('on');
      sortMode = btn.dataset.sort;
      renderAll();
    };
  });
  $('searchInput').addEventListener('input', function (e) { query = e.target.value.trim(); renderAll(); });

  $('exportBtn').onclick = function () {
    const list = sortList(DL.customers().filter(matches));
    // Prepend a UTF-8 BOM so Excel renders the ฿ symbol correctly.
    const blob = new Blob(['﻿' + buildCSV(list)], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'fairway-customers-' + fmtDate(new Date()) + '.csv';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  };

  DL.onChange(function () { renderAll(); });

  renderAll();
})();
</script>
</body>
</html>
